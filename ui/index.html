<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — ERP GAC</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            brand: { 50:'#eff6ff',100:'#dbeafe',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8',900:'#1e3a8a' }
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .glass { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); }
    .fade-in { animation: fadeIn .5s ease-out; }
    @keyframes fadeIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-100 to-blue-50 min-h-screen flex items-center justify-center p-6">

  <!-- Login Card -->
  <div id="loginCard" class="w-full max-w-md fade-in">
    <div class="glass rounded-2xl shadow-xl border border-white/50 p-8">
      <div class="flex items-center gap-3 mb-2">
        <div class="w-10 h-10 rounded-xl bg-brand-600 flex items-center justify-center text-white text-xl">
          <i class="ph ph-cube"></i>
        </div>
        <div>
          <h1 class="text-xl font-bold text-slate-900">ERP GAC</h1>
          <p class="text-xs text-slate-500">PT Gemilang Agung Cemerlang</p>
        </div>
      </div>
      <p class="text-sm text-slate-500 mb-6">Masukkan kredensial untuk mengakses sistem.</p>

      <div class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-slate-700 mb-1.5">Email</label>
          <div class="relative">
            <i class="ph ph-envelope absolute left-3 top-2.5 text-slate-400"></i>
            <input type="email" value="rizal@gemilangagung.co.id" class="w-full pl-9 pr-3 py-2 bg-white border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition" readonly>
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-700 mb-1.5">Password</label>
          <div class="relative">
            <i class="ph ph-lock-key absolute left-3 top-2.5 text-slate-400"></i>
            <input type="password" value="password123" class="w-full pl-9 pr-3 py-2 bg-white border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition" readonly>
          </div>
        </div>
        <button onclick="showTenant()" class="w-full py-2.5 bg-brand-600 hover:bg-brand-700 text-white font-semibold rounded-lg shadow-md shadow-brand-500/20 transition active:scale-[0.98] text-sm">
          Masuk
        </button>
      </div>
    </div>
  </div>

  <!-- Tenant Selection -->
  <div id="tenantCard" class="w-full max-w-md hidden fade-in">
    <div class="glass rounded-2xl shadow-xl border border-white/50 p-8">
      <div class="flex items-center gap-3 mb-2">
        <div class="w-10 h-10 rounded-xl bg-brand-600 flex items-center justify-center text-white text-xl">
          <i class="ph ph-buildings"></i>
        </div>
        <div>
          <h1 class="text-xl font-bold text-slate-900">Pilih Perusahaan</h1>
          <p class="text-xs text-slate-500">Akses multi-perusahaan aktif</p>
        </div>
      </div>
      <p class="text-sm text-slate-500 mb-6">Pilih tenant yang ingin Anda kelola hari ini.</p>

      <div class="space-y-3">
        <a href="dashboard.html" class="flex items-center gap-4 p-4 rounded-xl border border-slate-200 bg-white hover:border-brand-400 hover:shadow-md transition group">
          <div class="w-12 h-12 rounded-full bg-brand-50 text-brand-600 flex items-center justify-center text-2xl group-hover:scale-110 transition">
            <i class="ph ph-factory"></i>
          </div>
          <div class="flex-1">
            <div class="text-sm font-bold text-slate-800">PT Gemilang Agung Cemerlang</div>
            <div class="text-xs text-slate-500">Admin Perusahaan</div>
          </div>
          <i class="ph ph-caret-right text-slate-400 group-hover:text-brand-600"></i>
        </a>

        <a href="dashboard.html" class="flex items-center gap-4 p-4 rounded-xl border border-slate-200 bg-white hover:border-brand-400 hover:shadow-md transition group">
          <div class="w-12 h-12 rounded-full bg-emerald-50 text-emerald-600 flex items-center justify-center text-2xl group-hover:scale-110 transition">
            <i class="ph ph-handshake"></i>
          </div>
          <div class="flex-1">
            <div class="text-sm font-bold text-slate-800">PT Mitra Sejahtera</div>
            <div class="text-xs text-slate-500">Joint Venture — Viewer</div>
          </div>
          <i class="ph ph-caret-right text-slate-400 group-hover:text-brand-600"></i>
        </a>
      </div>

      <button onclick="backToLogin()" class="mt-6 text-xs text-slate-500 hover:text-brand-600 flex items-center gap-1 mx-auto">
        <i class="ph ph-arrow-left"></i> Kembali ke login
      </button>
    </div>
  </div>

  <script>
    function showTenant() {
      document.getElementById('loginCard').classList.add('hidden');
      document.getElementById('tenantCard').classList.remove('hidden');
    }
    function backToLogin() {
      document.getElementById('tenantCard').classList.add('hidden');
      document.getElementById('loginCard').classList.remove('hidden');
    }
  </script>
</body>
</html>
